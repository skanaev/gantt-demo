  /api/stages/{stageId}/processes/{processId}:
    patch:
      summary: Update process fields
      operationId: patchProcess
      parameters:
        - name: stageId
          in: path
          required: true
          schema:
            type: string
        - name: processId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProcessPatch"
            example:
              status: delayed
              durationMin: 130
              comment: Waiting for upstream fix
              delayReason: Partner token expired
      responses:
        "200":
          description: Process accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OkResponse"
              example:
                ok: true
                message: Process patch accepted by mock backend

components:
  schemas:
    ProcessStatus:
      type: string
      enum: [ok, delayed, blocked, done]

    Process:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - durationMin
        - status
        - updatedAt
      properties:
        id:
          type: string
        title:
          type: string
        startAt:
          type: string
          format: date-time
        plannedEndAt:
          type: string
          format: date-time
        durationMin:
          type: integer
          minimum: 1
        status:
          $ref: "#/components/schemas/ProcessStatus"
        comment:
          type: string
        delayReason:
          type: string
        meta:
          type: object
          additionalProperties:
            oneOf:
              - type: string
              - type: number
              - type: boolean
              - type: "null"
        updatedAt:
          type: string
          format: date-time

    Stage:
      type: object
      additionalProperties: false
      required:
        - id
        - title
        - start
        - processes
      properties:
        id:
          type: string
        title:
          type: string
        start:
          type: string
          format: date-time
        processes:
          type: array
          items:
            $ref: "#/components/schemas/Process"

    StagesResponse:
      type: object
      additionalProperties: false
      required:
        - generatedAt
        - source
        - stages
      properties:
        generatedAt:
          type: string
          format: date-time
        source:
          type: string
        stages:
          type: array
          items:
            $ref: "#/components/schemas/Stage"

    ProcessPatch:
      type: object
      additionalProperties: false
      properties:
        status:
          $ref: "#/components/schemas/ProcessStatus"
        durationMin:
          type: integer
          minimum: 1
        comment:
          type: string
        delayReason:
          type: string

    OkResponse:
      type: object
      additionalProperties: false
      required: [ok]
      properties:
        ok:
          type: boolean
        message:
          type: string
